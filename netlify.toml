[build]
  command = "npm run build:client"
  publish = "dist/public"

[functions]
  node_bundler = "esbuild"

[functions."generate-briefing"]
  timeout = 60

[functions."trigger-briefing"]
  timeout = 60

# Security headers applied to every response (see Netlify security checklist).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Reporting endpoint (modern Reporting API) for CSP violations; the matching
    # legacy report-uri is set inside the Report-Only policy below. Both point at
    # the csp-report function, which logs violations for tuning.
    Reporting-Endpoints = "csp-endpoint=\"/api/csp-report\""
    # Enforced CSP: only directives that cannot break normal SPA resource
    # loading are enforced here (no default-/script-/style-/connect-src), so
    # this is safe to ship without a full browser test. Adds base-tag,
    # form-hijack, clickjacking and plugin/embed (object/embed) protection.
    Content-Security-Policy = "base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'"
    # Report-Only: the intended stricter fetch policy. Non-blocking -- browsers
    # report violations to /api/csp-report so it can be tuned, then promoted into
    # the enforced header above. blob: is pre-allowed for mermaid (worker/img);
    # connect-src lists the UTP backend origin.
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://trading.ikigaios.com; worker-src 'self' blob:; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; report-uri /api/csp-report; report-to csp-endpoint"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
